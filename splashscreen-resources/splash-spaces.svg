<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="s-lg" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" class="accent-s1" stop-opacity="0.8"/>
      <stop offset="100%" class="accent-s2" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="s-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="accent-s1"/>
      <stop offset="100%" class="accent-s2"/>
    </linearGradient>
    <radialGradient id="s-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" class="accent-s1"/>
      <stop offset="100%" class="accent-s2"/>
    </radialGradient>
    <linearGradient id="s-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="accent-s1" stop-opacity="0.1"/>
      <stop offset="100%" class="accent-s2" stop-opacity="0.05"/>
    </linearGradient>
    <style>
      .accent-s1 { stop-color: #4a9fd4; }
      .accent-s2 { stop-color: #8b5fbf; }
      @media (prefers-color-scheme: dark) {
        .accent-s1 { stop-color: #5ea8c9; }
        .accent-s2 { stop-color: #9b4ea0; }
      }
    </style>
  </defs>
  <!-- central mass -->
  <circle cx="60" cy="60" r="4.5" fill="url(#s-core)" opacity="0.9">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- orbit 1 track -->
  <circle cx="60" cy="60" r="14" stroke="url(#s-accent)" stroke-opacity="0.35" stroke-width="0.7" fill="none"/>
  <!-- orbit 1 dot -->
  <circle cx="74" cy="60" r="2.8" fill="url(#s-accent)" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- orbit 2 track -->
  <circle cx="60" cy="60" r="24" stroke="url(#s-accent)" stroke-opacity="0.22" stroke-width="0.6" fill="none"/>
  <!-- orbit 2 dot -->
  <circle cx="84" cy="60" r="2.2" fill="url(#s-accent)" opacity="0.65">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="-360 60 60" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.85;0.55" dur="10s" repeatCount="indefinite"/>
  </circle>
  <!-- outer frame -->
  <rect x="30" y="30" width="60" height="60" rx="13" stroke="url(#s-lg)" stroke-width="1" fill="url(#s-fill)"/>
</svg>
