<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="s-lg" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <!-- central mass -->
  <circle cx="60" cy="60" r="4" fill="currentColor" opacity="0.6">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- orbit 1 track -->
  <circle cx="60" cy="60" r="14" stroke="currentColor" stroke-opacity="0.12" stroke-width="0.6" fill="none"/>
  <!-- orbit 1 dot -->
  <circle cx="74" cy="60" r="2.5" fill="currentColor" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- orbit 2 track -->
  <circle cx="60" cy="60" r="24" stroke="currentColor" stroke-opacity="0.08" stroke-width="0.6" fill="none"/>
  <!-- orbit 2 dot -->
  <circle cx="84" cy="60" r="2" fill="currentColor" opacity="0.35">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="-360 60 60" dur="10s" repeatCount="indefinite"/>
  </circle>
  <!-- outer frame -->
  <rect x="30" y="30" width="60" height="60" rx="13" stroke="url(#s-lg)" stroke-width="0.7" fill="none"/>
</svg>
