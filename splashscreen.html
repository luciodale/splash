<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Loading</title>
    <style>
      :root {
        --bg-deep: #020203;
        --bg-surface: #070709;
        --text-primary: #e8e6e3;
        --text-secondary: rgba(232, 230, 227, 0.55);
        --text-tertiary: rgba(232, 230, 227, 0.4);
        --dot-active: #e8e6e3;
        --dot-inactive: rgba(232, 230, 227, 0.12);
        --glow-color: rgba(255, 255, 255, 0.04);
        --glow-accent: rgba(200, 190, 255, 0.08);
        --grain-opacity: 0.035;
        --icon-glow: rgba(255, 255, 255, 0.04);
        --auth-dot: rgba(255, 255, 255, 0.5);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg-deep: #fafafa;
          --bg-surface: #ffffff;
          --text-primary: #18171a;
          --text-secondary: rgba(24, 23, 26, 0.55);
          --text-tertiary: rgba(24, 23, 26, 0.4);
          --dot-active: #18171a;
          --dot-inactive: rgba(24, 23, 26, 0.1);
          --glow-color: rgba(0, 0, 0, 0.03);
          --glow-accent: rgba(0, 0, 0, 0.04);
          --grain-opacity: 0.02;
          --icon-glow: rgba(0, 0, 0, 0.03);
          --auth-dot: rgba(0, 0, 0, 0.35);
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
          sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Ambient background ── */
      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .bg-glow {
        inset: -40%;
        background:
          radial-gradient(
            ellipse 50% 45% at 30% 25%,
            var(--glow-accent),
            transparent
          ),
          radial-gradient(
            ellipse 45% 40% at 70% 70%,
            var(--glow-color),
            transparent
          ),
          radial-gradient(
            ellipse 35% 30% at 50% 50%,
            var(--glow-accent),
            transparent
          );
        animation: drift 16s ease-in-out infinite alternate;
      }

      .bg-grain {
        opacity: var(--grain-opacity);
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 128px 128px;
      }

      @keyframes drift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(-8%, 5%) scale(1.1);
        }
      }

      /* ── Content wrapper ── */
      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        opacity: 0;
        animation: fadeIn 0.8s ease 0.2s forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      /* ── Slider ── */
      .slider-viewport {
        width: 100%;
        flex: 1;
        display: flex;
        align-items: center;
        overflow: hidden;
        position: relative;
        touch-action: pan-y;
      }

      .slider-track {
        display: flex;
        will-change: transform;
      }

      .slider-track.animated {
        transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .slide {
        width: 100vw;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 44px;
        gap: 10px;
      }

      /* ── Icon with ambient ring ── */
      .slide-icon-wrap {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .slide-icon {
        width: 120px;
        height: 120px;
        color: var(--text-primary);
        position: relative;
        z-index: 1;
      }

      .slide-icon svg {
        width: 100%;
        height: 100%;
      }

      /* ── Typography ── */
      .slide-title {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue",
          sans-serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.8px;
        text-align: center;
        line-height: 1.15;
      }

      .slide-description {
        font-size: 15px;
        font-weight: 300;
        line-height: 1.6;
        color: var(--text-secondary);
        text-align: center;
        max-width: 280px;
        letter-spacing: 0.1px;
      }

      /* ── Dots ── */
      .dots {
        padding: 20px 0 24px;
        display: flex;
        gap: 6px;
        justify-content: center;
        align-items: center;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 3px;
        background: var(--dot-inactive);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .dot.active {
        background: var(--dot-active);
        width: 28px;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.06);
      }

      @media (prefers-color-scheme: light) {
        .dot.active {
          box-shadow: 0 0 8px rgba(0, 0, 0, 0.04);
        }
      }

      /* ── Auth footer ── */
      .auth-footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 0 0 52px;
        opacity: 0;
        animation: fadeIn 0.6s ease 0.8s forwards;
      }

      .auth-dots {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .auth-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--auth-dot);
        animation: authPulse 1.4s ease-in-out infinite;
      }

      .auth-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .auth-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes authPulse {
        0%,
        80%,
        100% {
          opacity: 0.2;
          transform: scale(0.8);
        }
        40% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      .auth-text {
        font-size: 12px;
        font-weight: 400;
        color: var(--text-tertiary);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="bg-layer bg-glow"></div>
    <div class="bg-layer bg-grain"></div>

    <div class="content">
      <div class="slider-viewport" id="viewport">
        <div class="slider-track" id="track"></div>
      </div>
      <div class="dots" id="dots"></div>
      <div class="auth-footer">
        <div class="auth-dots">
          <div class="auth-dot"></div>
          <div class="auth-dot"></div>
          <div class="auth-dot"></div>
        </div>
        <span class="auth-text">Authenticating</span>
      </div>
    </div>

    <script>
      // ──────────────────────────────────────────────
      // CONFIGURABLE SECTIONS
      // Each: { title, description, svg (path in public/) }
      // ──────────────────────────────────────────────
      var SECTIONS = [
        {
          title: "Spaces",
          description:
            "Collaborate with AI, together. Shared workspaces where ideas flow freely between minds.",
          svg: "splashscreen-resources/splash-spaces.svg",
        },
        {
          title: "Presets",
          description:
            "One tap to expertise. Instantly configure AI for any task with curated presets.",
          svg: "splashscreen-resources/splash-presets.svg",
        },
        {
          title: "Agent Mode",
          description:
            "Autonomous AI delivers. Set a goal and let the agent reason, plan, and execute.",
          svg: "splashscreen-resources/splash-agent.svg",
        },
      ];

      // ──────────────────────────────────────────────
      // SLIDER ENGINE
      // ──────────────────────────────────────────────
      var track = document.getElementById("track");
      var viewport = document.getElementById("viewport");
      var dotsContainer = document.getElementById("dots");
      var count = SECTIONS.length;

      var slideData = [SECTIONS[count - 1]].concat(SECTIONS, [SECTIONS[0]]);

      function loadSvgInline(container, path) {
        fetch(path)
          .then(function (r) {
            return r.text();
          })
          .then(function (svg) {
            container.innerHTML = svg;
          })
          .catch(function () {});
      }

      slideData.forEach(function (s) {
        var div = document.createElement("div");
        div.className = "slide";

        var iconWrap = document.createElement("div");
        iconWrap.className = "slide-icon-wrap";

        var icon = document.createElement("div");
        icon.className = "slide-icon";
        loadSvgInline(icon, s.svg);

        iconWrap.appendChild(icon);

        var title = document.createElement("div");
        title.className = "slide-title";
        title.textContent = s.title;

        var desc = document.createElement("div");
        desc.className = "slide-description";
        desc.textContent = s.description;

        div.appendChild(iconWrap);
        div.appendChild(title);
        div.appendChild(desc);
        track.appendChild(div);
      });

      SECTIONS.forEach(function (_, i) {
        var d = document.createElement("div");
        d.className = "dot" + (i === 0 ? " active" : "");
        dotsContainer.appendChild(d);
      });
      var dots = dotsContainer.querySelectorAll(".dot");

      var current = 1;
      var busy = false;

      function setPos(idx, animate) {
        if (animate) track.classList.add("animated");
        else track.classList.remove("animated");
        track.style.transform = "translateX(-" + idx * 100 + "vw)";
      }

      function syncDots() {
        var real = (((current - 1) % count) + count) % count;
        dots.forEach(function (d, i) {
          d.classList.toggle("active", i === real);
        });
      }

      function goTo(idx) {
        if (busy) return;
        current = idx;
        busy = true;
        setPos(current, true);
        syncDots();
      }

      track.addEventListener("transitionend", function () {
        busy = false;
        if (current === 0) {
          current = count;
          setPos(current, false);
        } else if (current === count + 1) {
          current = 1;
          setPos(current, false);
        }
      });

      setPos(current, false);

      // ──── Touch ────
      var sx = 0,
        dx = 0,
        sy = 0,
        touching = false;

      viewport.addEventListener(
        "touchstart",
        function (e) {
          if (busy) return;
          sx = e.touches[0].clientX;
          sy = e.touches[0].clientY;
          dx = 0;
          touching = true;
          track.classList.remove("animated");
        },
        { passive: true },
      );

      viewport.addEventListener(
        "touchmove",
        function (e) {
          if (!touching) return;
          dx = e.touches[0].clientX - sx;
          var dy = e.touches[0].clientY - sy;
          if (Math.abs(dy) > Math.abs(dx) * 1.2) {
            touching = false;
            return;
          }
          track.style.transform =
            "translateX(" + (-(current * window.innerWidth) + dx) + "px)";
        },
        { passive: true },
      );

      viewport.addEventListener("touchend", function () {
        if (!touching) {
          setPos(current, true);
          return;
        }
        touching = false;
        var threshold = window.innerWidth * 0.2;
        if (dx < -threshold) goTo(current + 1);
        else if (dx > threshold) goTo(current - 1);
        else setPos(current, true);
      });

      // ──── Auto-advance ────
      var timer = setInterval(function () {
        goTo(current + 1);
      }, 4500);

      viewport.addEventListener(
        "touchstart",
        function () {
          clearInterval(timer);
        },
        { passive: true },
      );
      viewport.addEventListener(
        "touchend",
        function () {
          clearInterval(timer);
          timer = setInterval(function () {
            goTo(current + 1);
          }, 4500);
        },
        { passive: true },
      );
    </script>
  </body>
</html>
